# Site Settings
title: "Yusuf Adiputera – Lead Software Engineer"
description: "Lead Software Engineer with more than 8 years of experience in Java, SAP Commerce (Hybris), Spring MVC, and Spring Boot. Based in Jakarta, open to relocation."
author: "Yusuf Adiputera"
email: "yusuf@adiputera.id"
url: "https://adiputera.github.io"
baseurl: ""
timezone: Asia/Jakarta

# Asset Versioning (for cache-busting)
asset_version: "202605201230"

# Collections
collections:
  articles:
    output: true
    permalink: /articles/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "articles"
    values:
      layout: "article"

# Build settings
markdown: kramdown
kramdown:
  smart_quotes: ["apos", "apos", "quot", "quot"]
  typographic_symbols:
    hellip: "..."
    mdash: "---"
    ndash: "--"
highlighter: rouge

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-paginate-v2

# Pagination defaults (jekyll-paginate-v2). Opt-in per page via `pagination:` front matter.
pagination:
  enabled: true
  collection: 'articles'
  per_page: 6
  permalink: '/page:num/'
  sort_field: 'date'
  sort_reverse: true

# Autopages — auto-generate one paginated listing per tag at /tags/:tag/
autopages:
  enabled: true
  categories:
    enabled: false
  collections:
    enabled: false
  tags:
    enabled: true
    layouts:
      - 'tag.html'
    permalink: '/tags/:tag/'
    title: 'Articles tagged :tag'

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - FAQ.md
  - FAQ_SUGGESTIONS.md
  - SEO_RECOMMENDATIONS.md
  - README_RESUME.md
  - CLAUDE.md
  - CONTENT_MANAGEMENT.md
  - MIGRATION_SUMMARY.md
  - PHASE4_COMPLETE.md
  - TESTING.md
  - how-to-run.md
  - tasks.md
  - .gitignore
  - "*.backup"
  - .DS_Store
  - node_modules
  - package.json
  - package-lock.json
  - scripts
  - static-html
