{% assign lang_data = site.data[page.lang] | default: site.data.en %}
<script type="application/ld+json">
{
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
        {
            "@type": "ListItem",
            "position": 1,
            "name": "{{ lang_data.breadcrumb.home }}",
            "item": "{{ site.url }}{% if page.lang == 'id' %}/id{% else %}/{% endif %}"
        }{% if page.breadcrumb %},
        {
            "@type": "ListItem",
            "position": 2,
            "name": "{{ page.breadcrumb }}",
            "item": "{{ site.url }}{{ page.permalink }}"
        }{% endif %}
    ]
}
</script>
