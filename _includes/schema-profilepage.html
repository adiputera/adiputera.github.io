{%- if page.permalink == '/' or page.permalink == '/id' -%}

    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ProfilePage",
        "name": "Yusuf Adiputera - Lead Software Engineer",
        "url": "{{ site.url }}/",
        "description": "{% if page.lang == 'id' %}Portofolio profesional Yusuf Adiputera, Lead Software Engineer yang berspesialisasi dalam Java dan SAP Commerce{% else %}Professional portfolio of Yusuf Adiputera, Lead Software Engineer specializing in Java and SAP Commerce{% endif %}",
        "author": {
            "@type": "Person",
            "@id": "https://adiputera.github.io/#person",
            "name": "Yusuf Adiputera"
        },
        "mainEntity": {
            "@type": "Person",
            "@id": "https://adiputera.github.io/#person",
            "name": "Yusuf Adiputera"
        },
        "inLanguage": ["en", "id"],
        "datePublished": "{{ site.data.lastmod.published.home }}",
        "dateModified": "{% if page.lang == 'id' %}{{ site.data.lastmod.home_id }}{% else %}{{ site.data.lastmod.home_en }}{% endif %}",
        "speakable": {
            "@type": "SpeakableSpecification",
            "cssSelector": [".summary"]
        }
    }
    </script>
{%- elsif page.permalink == '/full' or page.permalink == '/full-id' -%}
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ProfilePage",
        "name": "{% if page.lang == 'id' %}Yusuf Adiputera - Lead Software Engineer (Versi Lengkap){% else %}Yusuf Adiputera - Lead Software Engineer (Detailed Version){% endif %}",
        "url": "{{ site.url }}{{ page.permalink }}",
        "description": "{% if page.lang == 'id' %}Resume lengkap Yusuf Adiputera, Lead Software Engineer dengan pengalaman lebih dari 8 tahun di Java, Microservices, Spring Boot, dan Enterprise Commerce (SAP/Spring).{% else %}Detailed resume of Yusuf Adiputera, Lead Software Engineer with more than 8 years of experience in Java, Microservices, Spring Boot, and Enterprise Commerce (SAP/Spring).{% endif %}",
        "author": {
            "@type": "Person",
            "@id": "https://adiputera.github.io/#person",
            "name": "Yusuf Adiputera"
        },
        "mainEntity": {
            "@type": "Person",
            "@id": "https://adiputera.github.io/#person",
            "name": "Yusuf Adiputera"
        },
        "inLanguage": ["en", "id"],
        "datePublished": "{{ site.data.lastmod.published.full }}",
        "dateModified": "{% if page.lang == 'id' %}{{ site.data.lastmod.full_id }}{% else %}{{ site.data.lastmod.full_en }}{% endif %}"
    }
    </script>
{%- endif -%}
