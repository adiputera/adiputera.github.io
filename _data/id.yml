  summary_html: |
    <p>Yusuf adalah Lead Software Engineer yang berspesialisasi dalam enterprise e-commerce platforms, distributed systems, dan arsitektur SAP Commerce (Hybris), dengan lebih dari 8 tahun pengalaman profesional dalam membangun sistem yang scalable dan high-performance di dalam ekosistem SAP.</p>
    <p>Dia memimpin desain arsitektur dan delivery platform skala enterprise, dengan fokus pada system scalability, platform modernization, dan strategi teknis jangka panjang. Keahliannya mencakup pengembangan SAP Commerce, arsitektur microservices berbasis Spring, Role-Based Access Control (RBAC) yang aman, dan integrasi sistem enterprise di seluruh lanskap SAP CX.</p>
    <p>Yusuf telah memimpin beberapa implementasi SAP Commerce skala besar dan platform upgrades di seluruh platform digital Astra Group, termasuk seva.id, auto2000.co.id, astra-daihatsu.id, dan motorkux.id. Dia memimpin pengembangan end-to-end motorkux.id dari analisis hingga peluncuran produksi dan terus mendorong evolusi platform berdasarkan kebutuhan bisnis dan teknis.</p>
    <p>Saat ini dia memimpin inisiatif modernisasi strategis untuk memigrasikan SAP Commerce ke arsitektur microservices berbasis Spring Boot, merancang arsitektur sistem inti dan kapabilitas platform yang reusable termasuk dynamic rules engine (rules-as-a-service) dan fondasi layanan yang scalable.</p>
    <p>Pekerjaannya menekankan pada performance dan scalability engineering, termasuk arsitektur full-page caching, optimalisasi storefront, dan perbaikan infrastruktur yang memungkinkan platform menangani lonjakan traffic yang signifikan dengan keandalan tinggi.</p>
    <p>Yusuf juga berkontribusi pada inisiatif integrasi enterprise termasuk SAP Customer Data Platform (CDP), SAP Engagement Cloud (formerly SAP Emarsys), dan SAP S/4HANA, mendukung data pelanggan yang terpadu, otomatisasi pemasaran, dan integrasi ERP.</p>
    <p>Dia sangat antusias dalam membangun maintainable systems, membimbing tim engineering, dan merancang scalable architectures yang mendukung pertumbuhan bisnis jangka panjang.</p>

