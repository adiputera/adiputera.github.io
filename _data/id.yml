experience:
  - title: "Lead Software Engineer"
    company: "PT Astra International Tbk"
    logo: "images/astra.svg"
    logo_alt: "PT Astra International Tbk Logo"
    start_date: "2020-04"
    start_display: "Apr 2020"
    end_date: null
    end_display: "Sekarang"
    duration: "Apr 2020 - Sekarang"
    description_html: |
      <p>Memimpin arsitektur dan evolusi platform <i>e-commerce</i> skala enterprise, mendorong modernisasi dari sistem monolit SAP Commerce ke ekosistem <i>microservices</i> yang scalable di berbagai domain bisnis.</p>

      <h4>Arsitektur &amp; Kepemilikan Platform</h4>
      <ul>
        <li>Merancang dan mengimplementasikan lapisan platform inti untuk <i>commerce</i> skala enterprise; ikut mendefinisikan <i>service boundaries</i> dan kontrak integrasi bersama Solution Architect.</li>
        <li>Memiliki lapisan <i>core</i> bersama yang menjadi dasar layanan <i>core</i>, CMS, dan produk.</li>
        <li>Menetapkan <i>service boundaries</i>, standar platform, dan strategi evolusi sistem jangka panjang.</li>
        <li>Membangun kapabilitas platform yang <i>reusable</i> termasuk <i>rules engine</i> dan komponen infrastruktur bersama.</li>
      </ul>

      <h4>Modernisasi Platform</h4>
      <ul>
        <li>Memimpin migrasi skala enterprise dari monolit SAP Commerce ke <i>microservices</i> berbasis Spring Boot.</li>
        <li>Otoritas teknis atas <i>library</i> platform inti yang digunakan 3 tim produk di berbagai domain bisnis.</li>
        <li>Mendefinisikan standar engineering dan pedoman implementasi untuk <i>distributed systems</i>.</li>
      </ul>

      <h4>Skalabilitas &amp; <i>Performance Engineering</i></h4>
      <ul>
        <li>Mendiagnosis amplifikasi permintaan 10× pada SAP Commerce Accelerator melalui Datadog (20–30 RPS inbound hingga 200–300 operasi internal/detik).</li>
        <li>Mengimplementasikan <i>full-page caching</i> EHCache dengan invalidasi selektif, mengurangi operasi internal sebesar ~70-85% dan latensi P95 dari 2,1 detik menjadi ~800ms.</li>
        <li>Meningkatkan ketahanan sistem untuk menangani lonjakan <i>traffic</i> 3× tanpa <i>downtime</i> atau penskalaan horizontal.</li>
        <li>Mengurangi ukuran <i>payload</i> gambar hingga 80% melalui layanan <i>image proxy</i> kustom.</li>
        <li>Mengoptimalkan kinerja <i>storefront</i> melalui <i>CMS lazy loading</i> dan perbaikan <i>rendering</i>.</li>
      </ul>

      <h4>Keamanan &amp; Kontrol Akses</h4>
      <ul>
        <li>Merancang kontrol akses berbasis JWT/OAuth2 di seluruh <i>microservices</i> menggunakan model Permission-Based Access Control (PBAC), di mana <i>endpoint</i> API diamankan berdasarkan izin spesifik melalui anotasi kustom <code>@Secured</code>, bukan peran secara umum.</li>
        <li>Mengimplementasikan cache access-token berbasis Redis dengan fallback ke DB untuk pengecekan validitas, dan pemberian peran berbatas waktu.</li>
      </ul>

      <h4>Integrasi Enterprise</h4>
      <ul>
        <li>Berkontribusi pada implementasi SAP Customer Data Platform (SAP CDP) dan SAP Emarsys untuk data pelanggan terpadu dan otomatisasi pemasaran.</li>
      </ul>

      <h4><i>Engineering Leadership</i> &amp; Pengaruh Teknis</h4>
      <ul>
        <li>Memimpin tim hingga 12 <i>engineers</i> dalam pengembangan platform secara <i>end-to-end</i>.</li>
        <li>Berperan sebagai konsultan teknis internal lintas tim, memberikan panduan arsitektur dan desain solusi untuk proyek paralel.</li>
        <li>Mendorong keselarasan teknis lintas tim, memastikan konsistensi dalam arsitektur, standar, dan <i>best practices</i>.</li>
        <li>Membimbing <i>engineers</i> dan <i>senior developers</i> dalam desain sistem, performa, dan arsitektur yang scalable.</li>
        <li>Berkolaborasi dengan tim produk, infrastruktur, dan integrasi enterprise untuk menyelaraskan solusi teknis dengan tujuan bisnis.</li>
        <li>Bertanggung jawab atas desain <i>pipeline</i> CI/CD dan strategi <i>deployment</i> di Azure DevOps dan Jenkins.</li>
        <li>Menerima penghargaan <strong>Best Project Development Quality (2024)</strong>.</li>
      </ul>

      <h4>Pencapaian Terpilih</h4>
      <ul>
        <li>Meluncurkan <strong>motorkux.id</strong> go-live (2022) dan <strong>seva.id marketplace</strong> (2020) dengan integrasi pembayaran, pengiriman, dan pihak ketiga.</li>
        <li><strong>Rules-as-a-Service.</strong> Merancang platform Rules-as-a-Service yang memungkinkan tim bisnis membuat dan mengirim aturan harga, promosi, dan eligibility baru secara langsung, tanpa melalui siklus rilis backend. Pilihan desain utamanya adalah menjaga engine tetap generik: tidak mengenal apa itu Customer atau Product, hanya mengevaluasi kondisi pada data apa pun yang dikirim klien. Itulah invarian yang membuat aturan baru bisa di-onboard tanpa keterlibatan engineering. Keterlibatan backend hanya dibutuhkan untuk kategori logika aturan yang benar-benar baru (misalnya menambahkan jenis kondisi baru), yang jarang terjadi dan mudah dibedakan dari "tambah aturan baru".</li>
        <li>Memimpin beberapa <i>upgrade</i> SAP Commerce di seluruh platform enterprise (seva.id, auto2000, motorkux.id - versi 6.6 → 2205).</li>
        <li>Mengembangkan <i>promotion engine</i> kustom yang mendukung kuota berbasis lokasi tanpa ketergantungan kupon.</li>
      </ul>

      <p class="tech-stack"><strong>Technology Stack:</strong> Java, Spring Boot, Spring MVC, Microservices Architecture, SAP Commerce (Hybris), Drools, EHCache, Kafka, Redis, SAP CDP, SAP Emarsys, Azure DevOps, Jenkins, Docker, AKS, Azure Function App, TypeScript.</p>

