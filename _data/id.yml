  summary_html: |
    <p>Yusuf adalah Lead Software Engineer dengan pengalaman lebih dari 8 tahun yang berspesialisasi dalam arsitektur Java dan Spring Framework, platform e-commerce enterprise, dan sistem terdistribusi. Ia memiliki rekam jejak yang terbukti dalam merancang dan mengirimkan platform bertrafik tinggi untuk Astra Group, termasuk seva.id, auto2000.co.id, dan motorkux.id.</p>
    <p>Saat ini, ia memimpin inisiatif modernisasi besar untuk memigrasikan monolit SAP Commerce lama ke ekosistem microservices Spring Boot. Dalam peran ini, ia merancang kapabilitas inti yang dapat digunakan kembali, termasuk dynamic rules engine (Rules-as-a-Service) dan fondasi layanan yang skalabel.</p>
    <p>Filosofi rekayasanya sangat menekankan pada performa dan keandalan sistem. Dengan mengimplementasikan full-page caching (EHCache) dan proxy gambar kustom, ia telah berhasil mengurangi waktu muat halaman (page load) menjadi sub-detik dan memastikan platform dapat menangani lonjakan trafik 3× lipat secara andal.</p>
    <p>Di luar kode aplikasi, Yusuf membawa keahlian yang kuat dalam infrastruktur dan arsitektur data. Ia telah mengeksekusi migrasi database yang kompleks (SAP HANA ke Aurora MySQL), membangun pipeline CI/CD tanpa waktu henti (zero-downtime), dan membangun integrasi event-driven menggunakan Kafka untuk menghubungkan sistem enterprise seperti SAP CDP, Emarsys, dan S/4HANA.</p>
    <p>Sebagai pemimpin engineering, Yusuf bertindak sebagai konsultan teknis internal di berbagai proyek paralel. Ia senang memimpin tim engineering, membimbing para developer, dan menetapkan standar teknis yang mendorong pertumbuhan bisnis jangka panjang.</p>

