experience:
  - title: "Lead Software Engineer"
    company: "PT Astra International Tbk"
    logo: "images/astra.svg"
    logo_alt: "PT Astra International Tbk Logo"
    start_date: "2021-02"
    start_display: "Feb 2021"
    end_date: null
    end_display: "Sekarang"
    duration: "Feb 2021 - Sekarang"
    description_html: |
      <p>Memimpin arsitektur dan <i>delivery</i> platform <i>e-commerce</i> SAP Commerce (Hybris) skala enterprise, dengan fokus pada <i>scalability</i> sistem, modernisasi platform, dan integrasi perusahaan. Bertanggung jawab atas <i>engineering leadership</i>, desain sistem inti, dan evolusi platform jangka panjang di berbagai domain bisnis.</p>

      <h4>Engineering Leadership</h4>
      <ul>
        <li>Memimpin tim hingga 12 <i>engineers</i> yang mengirimkan platform <i>e-commerce</i> enterprise dari analisis hingga produksi (motorkux.id go-live Juni 2022).</li>
        <li>Bertanggung jawab atas <i>end-to-end delivery</i> termasuk desain arsitektur, perencanaan proyek, eksekusi sprint, dan manajemen rilis.</li>
        <li>Menetapkan <i>coding standards</i> dan menegakkan <i>engineering quality</i> melalui <i>code reviews</i>, <i>technical mentoring</i>, dan <i>knowledge sharing</i>.</li>
        <li>Mengoordinasikan kolaborasi lintas tim di seluruh tim produk, infrastruktur, dan integrasi perusahaan.</li>
        <li>Memenangkan penghargaan internal “Best Project Development Quality” (2024).</li>
      </ul>

      <h4>Platform Modernization & Architecture (Sedang berlangsung)</h4>
      <ul>
        <li>Memimpin inisiatif modernisasi perusahaan untuk memigrasikan platform SAP Commerce ke arsitektur <i>microservices</i> berbasis Spring Boot.</li>
        <li>Merancang arsitektur sistem inti yang mendukung berbagai domain bisnis dan mengawasi 3 proyek <i>rewrite</i> paralel.</li>
        <li>Menetapkan <i>service boundaries</i>, standar arsitektur, dan pedoman implementasi.</li>
        <li>Merancang model <i>Role-Based Access Control</i> (RBAC) yang aman untuk otorisasi layanan dan perlindungan sumber daya.</li>
      </ul>

      <h4>Rule Engine Platform (Rules-as-a-Service)</h4>
      <ul>
        <li>Merancang <i>dynamic rule engine</i> menggunakan Drools yang memungkinkan kondisi dan tindakan yang ditentukan klien tanpa <i>code deployment</i>.</li>
        <li>Membangun platform aturan yang <i>reusable</i> yang memisahkan <i>business logic</i> dari layanan aplikasi.</li>
        <li>Mengimplementasikan model aturan fleksibel yang tidak terikat erat dengan <i>domain objects</i>.</li>
        <li>Disampaikan sebagai kemampuan platform inti untuk modernisasi SAP Commerce dan arsitektur layanan masa depan.</li>
        <li>Mengembangkan payload validator on the fly menggunakan Drools (2025).</li>
      </ul>

      <h4>Performance & Scalability Engineering</h4>
      <ul>
        <li>Merancang dan mengimplementasikan arsitektur <i>full-page caching</i> (EHCache), mengurangi <i>page load time</i> dari ~2 detik menjadi respons sub-detik.</li>
        <li>Meningkatkan ketahanan platform yang memungkinkan sistem menangani lonjakan <i>traffic</i> lebih dari 3× tanpa <i>downtime</i>.</li>
        <li>Mengoptimalkan kinerja <i>storefront</i> melalui strategi <i>CMS lazy loading</i> dan optimalisasi <i>rendering</i>.</li>
        <li>Membangun <i>image resizer proxy</i> yang mengurangi ukuran <i>payload</i> hingga 80% dan meningkatkan kinerja <i>page load</i>.</li>
        <li>Meningkatkan kinerja <i>JSP storefront</i>.</li>
        <li>Mengembangkan image resizer proxy (2024).</li>
      </ul>

      <h4>SAP Commerce Platform Engineering</h4>
      <ul>
        <li>Memimpin beberapa <i>upgrades</i> platform SAP Commerce di seluruh sistem perusahaan:
          <ul>
            <li>seva.id marketplace & otomotif (6.6 → 20.11)</li>
            <li>auto2000 & Astra-Daihatsu (19.05 → 20.11)</li>
            <li>motorkux.id (2105 → 2205)</li>
          </ul>
        </li>
        <li>Mengembangkan <i>promotion engine</i> kustom yang mendukung kuota berbasis lokasi tanpa ketergantungan kupon (2023).</li>
        <li>Mengimplementasikan mekanisme <i>employee role expiration</i> untuk kontrol akses perusahaan.</li>
      </ul>

      <h4>Enterprise Integration</h4>
      <ul>
        <li>Berkontribusi pada implementasi SAP Customer Data Platform (SAP CDP) dan SAP Engagement Cloud (formerly SAP Emarsys) untuk data pelanggan dan otomatisasi pemasaran.</li>
        <li>Mendukung inisiatif integrasi SAP S/4HANA dan memperluas keahlian ABAP untuk integrasi ERP.</li>
      </ul>

      <h4>Core Responsibilities</h4>
      <ul>
        <li>Desain arsitektur dan perencanaan evolusi sistem</li>
        <li>Perencanaan proyek dan manajemen pengiriman</li>
        <li>Tata kelola <i>engineering standards</i> dan <i>code review</i></li>
        <li>Implementasi <i>pipeline</i> CI/CD (Azure DevOps, Jenkins)</li>
        <li>Peningkatan platform dan strategi <i>deployment</i></li>
        <li>Optimalisasi kinerja dan perbaikan <i>scalability</i></li>
      </ul>

      <p class="tech-stack"><strong>Technology Stack:</strong> SAP Commerce (Hybris), Java, Spring MVC, Spring Boot, Microservices Architecture, RBAC, Drools, EHCache, JSP, Azure DevOps, Jenkins, SAP CDP, SAP Emarsys, SAP S/4HANA.</p>

