  summary_html: |
    <p>Saya seorang Lead Software Engineer dengan pengalaman lebih dari 8 tahun yang berspesialisasi dalam arsitektur Java dan Spring Framework, platform e-commerce enterprise, dan sistem terdistribusi. Saya telah merancang dan mengirimkan platform berskala enterprise untuk Astra Group (PT Astra International Tbk, IDX:ASII — konglomerat terdiversifikasi terbesar di Indonesia), termasuk seva.id, auto2000.co.id, dan motorkux.id.</p>
    <p>Saat ini, saya memimpin inisiatif modernisasi besar yang memigrasikan monolit SAP Commerce lama ke ekosistem microservices Spring Boot. Dalam peran ini, saya merancang kapabilitas inti yang dapat digunakan kembali, termasuk dynamic rules engine (Rules-as-a-Service) dan fondasi layanan yang skalabel.</p>
    <p>Filosofi rekayasa saya sangat menekankan pada performa dan keandalan sistem. Dengan mengimplementasikan full-page caching (EHCache) dan proxy gambar kustom, saya telah mengurangi waktu muat halaman (page load) menjadi sub-detik dan memastikan platform dapat menangani lonjakan trafik 3× lipat secara andal.</p>
    <p>Saya juga telah mengeksekusi migrasi database yang kompleks (SAP HANA ke Aurora MySQL), membangun pipeline CI/CD tanpa waktu henti (zero-downtime), dan membangun integrasi event-driven menggunakan Kafka untuk menghubungkan sistem enterprise seperti SAP CDP dan Emarsys.</p>
    <p>Sebagai pemimpin engineering, saya bertindak sebagai konsultan teknis internal di berbagai proyek paralel. Saya senang memimpin tim engineering, membimbing para developer, dan menetapkan standar teknis yang mendorong pertumbuhan bisnis jangka panjang.</p>

