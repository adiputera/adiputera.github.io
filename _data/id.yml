    description_html: |
      <p>Memimpin arsitektur dan evolusi platform <i>e-commerce</i> skala enterprise, mendorong modernisasi dari sistem monolit SAP Commerce ke ekosistem <i>microservices</i> yang scalable di berbagai domain bisnis.</p>

      <h4>Arsitektur &amp; Kepemilikan Platform</h4>
      <ul>
        <li>Mendefinisikan dan memimpin arsitektur <i>microservices</i> untuk platform <i>commerce</i> dengan <i>traffic</i> tinggi.</li>
        <li>Bertanggung jawab atas desain sistem lintas domain meliputi layanan <i>core</i>, CMS, dan produk.</li>
        <li>Menetapkan <i>service boundaries</i>, standar platform, dan strategi evolusi sistem jangka panjang.</li>
        <li>Membangun kapabilitas platform yang <i>reusable</i> termasuk <i>rules engine</i> dan komponen infrastruktur bersama.</li>
      </ul>

      <h4>Modernisasi Platform</h4>
      <ul>
        <li>Memimpin migrasi skala enterprise dari monolit SAP Commerce ke <i>microservices</i> berbasis Spring Boot.</li>
        <li>Mengawasi 3 jalur <i>rewrite</i> paralel di berbagai domain bisnis.</li>
        <li>Mendefinisikan standar engineering dan pedoman implementasi untuk <i>distributed systems</i>.</li>
      </ul>

      <h4>Skalabilitas &amp; <i>Performance Engineering</i></h4>
      <ul>
        <li>Mengurangi <i>page load time</i> dari ~2 detik menjadi sub-detik melalui arsitektur <i>full-page caching</i> (EHCache).</li>
        <li>Meningkatkan ketahanan sistem untuk menangani lonjakan <i>traffic</i> 3× tanpa <i>downtime</i>.</li>
        <li>Mengurangi ukuran <i>payload</i> gambar hingga 80% melalui layanan <i>image proxy</i> kustom.</li>
        <li>Mengoptimalkan kinerja <i>storefront</i> melalui <i>CMS lazy loading</i> dan perbaikan <i>rendering</i>.</li>
      </ul>

      <h4>Keamanan &amp; Kontrol Akses</h4>
      <ul>
        <li>Merancang dan mengimplementasikan <i>Role-Based Access Control</i> (RBAC) untuk otorisasi di level layanan.</li>
        <li>Mengimplementasikan siklus akses yang aman termasuk mekanisme <i>employee role expiration</i>.</li>
      </ul>

      <h4>Integrasi Enterprise</h4>
      <ul>
        <li>Berkontribusi pada implementasi SAP Customer Data Platform (SAP CDP) dan SAP Emarsys untuk data pelanggan terpadu dan otomatisasi pemasaran.</li>
        <li>Mendukung inisiatif integrasi SAP S/4HANA dan memperluas keahlian ABAP untuk integrasi ERP.</li>
      </ul>

      <h4><i>Engineering Leadership</i> &amp; Pengaruh Teknis</h4>
      <ul>
        <li>Memimpin tim hingga 12 <i>engineers</i> dalam pengembangan platform secara <i>end-to-end</i>.</li>
        <li>Berperan sebagai konsultan teknis internal lintas tim, memberikan panduan arsitektur dan desain solusi untuk proyek paralel.</li>
        <li>Mendorong keselarasan teknis lintas tim, memastikan konsistensi dalam arsitektur, standar, dan <i>best practices</i>.</li>
        <li>Membimbing <i>engineers</i> dan <i>senior developers</i> dalam desain sistem, performa, dan arsitektur yang scalable.</li>
        <li>Berkolaborasi dengan tim produk, infrastruktur, dan integrasi enterprise untuk menyelaraskan solusi teknis dengan tujuan bisnis.</li>
        <li>Bertanggung jawab atas desain <i>pipeline</i> CI/CD dan strategi <i>deployment</i> di Azure DevOps dan Jenkins.</li>
        <li>Menerima penghargaan <strong>Best Project Development Quality (2024)</strong>.</li>
      </ul>

      <h4>Pencapaian Terpilih</h4>
      <ul>
        <li>Meluncurkan <strong>motorkux.id</strong> go-live (2022) dan <strong>seva.id marketplace</strong> (2020) dengan integrasi pembayaran, pengiriman, dan pihak ketiga.</li>
        <li>Merancang platform Rules-as-a-Service menggunakan Drools untuk logika bisnis dinamis tanpa <i>code deployment</i>.</li>
        <li>Memimpin beberapa <i>upgrade</i> SAP Commerce di seluruh platform enterprise (seva.id, auto2000, motorkux.id - versi 6.6 → 2205).</li>
        <li>Mengembangkan <i>promotion engine</i> kustom yang mendukung kuota berbasis lokasi tanpa ketergantungan kupon.</li>
      </ul>

      <p class="tech-stack"><strong>Technology Stack:</strong> Java, Spring Boot, Spring MVC, Microservices Architecture, SAP Commerce (Hybris), Drools, EHCache, JSP, SAP CDP, SAP Emarsys, SAP S/4HANA, Azure DevOps, Jenkins, MySQL.</p>

