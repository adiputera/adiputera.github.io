      - question: "What is SAP Customer Data Platform (SAP CDP)?"
        answer: |
          <p>SAP Customer Data Platform (SAP CDP) enables organizations to unify and manage customer data securely across channels, helping brands deliver personalized and consent-based experiences at scale.</p>
      - question: "What is SAP Emarsys?"
        answer: |
          <p>SAP Emarsys (now rebranded as SAP Engagement Cloud) is a customer engagement platform focused on marketing automation, providing tools for personalized omnichannel communication, campaign orchestration, and customer lifecycle management.</p>
      - question: "What is SAP Engagement Cloud?"
