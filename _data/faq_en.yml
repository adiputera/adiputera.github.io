      - question: "What is Java used for in enterprise applications?"
        answer: |
          <p>Java is a popular programming language used for building scalable, secure, and cross-platform enterprise applications. It powers web applications, APIs, backend systems, and business platforms such as ERP, CRM, and e-commerce systems. Its strong ecosystem, stability, and performance make it a preferred language for enterprise-grade software.</p>
      - question: "What is Spring MVC and Spring Boot?"
        answer: |
          <p>Spring MVC (Model-View-Controller) is a web framework in the Spring ecosystem used to build structured, maintainable web applications with clear separation between business logic and user interfaces. Spring Boot, on the other hand, is a framework built on top of Spring that simplifies configuration and deployment. It allows developers to quickly create production-ready applications with minimal setup — reducing boilerplate and making development faster and more efficient.</p>
      - question: "What is the difference between Spring MVC and Spring Boot?"
        answer: |
          <p>The main difference between Spring MVC and Spring Boot lies in configuration and ease of use. Spring MVC requires manual setup and configuration of dependencies, web.xml, and context files. Spring Boot automates much of that, using "convention over configuration" and embedded servers like Tomcat or Jetty to run applications directly — making it ideal for microservices and rapid development.</p>
      - question: "What is SAP Commerce (Hybris)?"
        answer: |
          <p>SAP Commerce (formerly Hybris) is an enterprise-level e-commerce platform built on Java and the Spring Framework. It provides powerful tools for managing product catalogs, pricing, promotions, and customer experiences across web, mobile, and omnichannel environments. It is widely used by large companies to handle complex B2B and B2C digital commerce operations.</p>
      - question: "What is the role of a Lead Software Engineer in SAP Commerce projects?"
