summary_html: |
  <p>
      Lead Software Engineer dengan pengalaman lebih dari 8 tahun yang berspesialisasi dalam <strong>arsitektur
      Java &amp; Spring dan platform e-commerce enterprise</strong>.
      Berpengalaman dalam merancang dan mengirimkan sistem utama untuk Astra Group (IDX:ASII), dengan fokus pada skalabilitas,
      modernisasi platform, dan integrasi microservices.
  </p>
  <p>
      Keahlian mencakup microservices berbasis Spring, dynamic rules engine (Rules-as-a-Service),
      dan rekayasa performa (mencapai waktu muat sub-detik). Membawa pengalaman mendalam dalam 
      infrastruktur (CI/CD, migrasi database) dan integrasi SAP enterprise (CDP, Emarsys, S/4HANA).
      Berdedikasi pada kepemimpinan engineering, strategi teknis, dan membangun sistem yang mudah dipelihara.
  </p>
