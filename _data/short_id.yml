summary_html: |
  <p>
      Lead Software Engineer dengan lebih dari 8 tahun pengalaman spesialisasi dalam <strong>arsitektur
          Java dan SAP Commerce (Hybris)</strong>.
      Memiliki rekam jejak terbukti dalam merancang dan mengirimkan platform e-commerce skala enterprise
      untuk Astra Group, berfokus pada skalabilitas,
      modernisasi platform, dan integrasi sistem berperforma tinggi.
  </p>
  <p>
      Keahlian mencakup microservices berbasis Spring, dynamic rules engine (Rules-as-a-Service),
      performance engineering (EHCache, lazy loading),
      dan integrasi enterprise di seluruh lanskap SAP (SAP CDP, SAP Engagement/Emarsys, S/4HANA).
      Bersemangat dalam kepemimpinan engineering,
      strategi teknis, dan membangun sistem high-availability yang mudah dipelihara.
  </p>
