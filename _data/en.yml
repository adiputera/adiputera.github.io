    end_date: null
    end_display: "Present"
    duration: "Feb 2021 - Present"
    description_html: |
      <p>Lead architecture and delivery of enterprise-scale SAP Commerce (Hybris) e-commerce platforms, focusing on system scalability, platform modernization, and enterprise integration. Responsible for engineering leadership, core system design, and long-term platform evolution across multiple business domains.</p>

      <h4>Engineering Leadership</h4>
      <ul>
        <li>Led a team of up to 12 engineers delivering enterprise e-commerce platforms from analysis through production (motorkux.id go-live June 2022).</li>
        <li>Owned end-to-end delivery including architecture design, project planning, sprint execution, and release management.</li>
        <li>Established coding standards and enforced engineering quality through code reviews, technical mentoring, and knowledge sharing.</li>
        <li>Coordinated cross-team collaboration across product, infrastructure, and enterprise integration teams.</li>
        <li>Won internal "Best Project Development Quality" award (2024).</li>
      </ul>

      <h4>Platform Modernization & Architecture (on going)</h4>
      <ul>
        <li>Leading enterprise modernization initiative to migrate SAP Commerce platform to Spring Boot–based microservices architecture.</li>
        <li>Designed core system architecture supporting multiple business domains and supervising 3 parallel rewrite projects.</li>
        <li>Defined service boundaries, architecture standards, and implementation guidelines.</li>
        <li>Designed secure Role-Based Access Control (RBAC) model for service authorization and resource protection.</li>
      </ul>

      <h4>Rule Engine Platform (Rules-as-a-Service)</h4>
      <ul>
        <li>Designed dynamic rule engine using Drools enabling client-defined conditions and actions without code deployment.</li>
        <li>Built reusable rules platform decoupling business logic from application services.</li>
        <li>Implemented flexible rule model not tightly coupled to domain objects.</li>
        <li>Delivered as core platform capability for SAP Commerce modernization and future service architecture.</li>
        <li>Developed payload validator on the fly, using Drools (2025).</li>
      </ul>

      <h4>Performance & Scalability Engineering</h4>
      <ul>
        <li>Designed and implemented full-page caching architecture (EHCache), reducing page load time from ~2s to sub-second response.</li>
        <li>Improved platform resilience enabling system to handle more than 3× traffic spikes without downtime.</li>
        <li>Optimized storefront performance through CMS lazy loading strategy and rendering optimization.</li>
        <li>Built image resizer proxy reducing payload size up to 80% and improving page load performance.</li>
        <li>Improved JSP storefront performance.</li>
        <li>Developed image resizer proxy (2024).</li>
      </ul>

      <h4>SAP Commerce Platform Engineering</h4>
      <ul>
        <li>Led multiple SAP Commerce platform upgrades across enterprise systems:
          <ul>
            <li>seva.id marketplace & otomotif (6.6 → 20.11)</li>
            <li>auto2000 & Astra-Daihatsu (19.05 → 20.11)</li>
            <li>motorkux.id (2105 → 2205)</li>
          </ul>
        </li>
        <li>Developed custom promotion engine supporting location-based quota without coupon dependency (2023).</li>
        <li>Implemented employee role expiration mechanism for enterprise access control.</li>
      </ul>

      <h4>Enterprise Integration</h4>
      <ul>
        <li>Contributed to SAP Customer Data Platform (SAP CDP) and SAP Engagement Cloud (formerly SAP Emarsys) implementation for customer data and marketing automation.</li>
        <li>Supporting SAP S/4HANA integration initiatives and expanding ABAP expertise for ERP integration.</li>
      </ul>

      <h4>Core Responsibilities</h4>
      <ul>
        <li>Architecture design and system evolution planning</li>
        <li>Project planning and delivery management</li>
        <li>Engineering standards governance and code review</li>
        <li>Platform upgrade and deployment strategy</li>
        <li>Performance optimization and scalability improvements</li>
      </ul>

      <p><strong>Technology Stack:</strong> SAP Commerce (Hybris), Java, Spring MVC, Spring Boot, Microservices Architecture, Drools, EHCache, JSP, SAP CDP, SAP Emarsys, SAP S/4HANA.</p>

