    <p>Yusuf also contributes to enterprise integration initiatives including SAP Customer Data Platform (CDP), SAP Engagement Cloud (formerly SAP Emarsys), and SAP S/4HANA, supporting unified customer data, marketing automation, and ERP integration.</p>
    <p>He is passionate about building maintainable systems, mentoring engineering teams, and designing scalable architectures that support long-term business growth.</p>

