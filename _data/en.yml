experience:
  - title: "Lead Software Engineer"
    company: "PT Astra International Tbk"
    logo: "images/astra.svg"
    logo_alt: "PT Astra International Tbk Logo"
    start_date: "2020-04"
    start_display: "Apr 2020"
    end_date: null
    end_display: "Present"
    duration: "Apr 2020 - Present"
    description_html: |
      <p>Lead architecture and evolution of enterprise-scale e-commerce platforms, driving modernization from monolithic SAP Commerce systems to a scalable microservices ecosystem across multiple business domains.</p>

      <h4>Architecture &amp; Platform Ownership</h4>
      <ul>
        <li>Defined and led microservices architecture for enterprise-scale commerce platforms.</li>
        <li>Owned cross-domain system design across core, CMS, and product services.</li>
        <li>Established service boundaries, platform standards, and long-term system evolution strategy.</li>
        <li>Built reusable platform capabilities including rules engine and shared infrastructure components.</li>
      </ul>

      <h4>Platform Modernization</h4>
      <ul>
        <li>Leading enterprise-wide migration from SAP Commerce monolith to Spring Boot–based microservices.</li>
        <li>Supervising 3 parallel rewrite tracks across multiple business domains.</li>
        <li>Defined engineering standards and implementation guidelines for distributed systems.</li>
      </ul>

      <h4>Scalability &amp; Performance Engineering</h4>
      <ul>
        <li>Diagnosed 10× request amplification on SAP Commerce Accelerator via Datadog (20–30 inbound RPS to 200–300 internal ops/sec).</li>
        <li>Implemented EHCache full-page caching with selective invalidation, reducing internal operations by ~85% and P95 latency from 2.1s to ~800ms.</li>
        <li>Improved system resilience to handle 3–5× traffic spikes without downtime or horizontal scaling.</li>
        <li>Reduced image payload size by up to 80% through custom image proxy service.</li>
        <li>Optimized storefront performance via CMS lazy loading and rendering improvements.</li>
      </ul>

      <h4>Security &amp; Access Control</h4>
      <ul>
        <li>Designed JWT/OAuth2-based access control across microservices using a permission-based role model, where API endpoints are secured by granular permissions via custom <code>@Secured</code> annotations rather than broad roles.</li>
        <li>Implemented Redis-backed token revocation and time-bounded role grants, eliminating manual access-revocation operations.</li>
      </ul>

      <h4>Enterprise Integration</h4>
      <ul>
        <li>Contributed to SAP Customer Data Platform (SAP CDP) and SAP Emarsys implementation for unified customer data and marketing automation.</li>
        <li>Supporting SAP S/4HANA integration initiatives and expanding ABAP expertise for ERP integration (ongoing).</li>
      </ul>

      <h4>Engineering Leadership &amp; Technical Influence</h4>
      <ul>
        <li>Led a team of up to 12 engineers delivering end-to-end platform development.</li>
        <li>Acted as internal technical consultant across multiple teams, providing architectural guidance and solution design for parallel projects.</li>
        <li>Drove cross-team technical alignment, ensuring consistency in architecture, standards, and best practices.</li>
        <li>Mentored engineers and senior developers on system design, performance, and scalable architecture.</li>
        <li>Collaborated with product, infrastructure, and enterprise integration teams to align technical solutions with business goals.</li>
        <li>Owned CI/CD pipeline design and deployment strategy across Azure DevOps and Jenkins.</li>
        <li>Awarded <strong>Best Project Development Quality (2024)</strong>.</li>
      </ul>

      <h4>Selected Achievements</h4>
      <ul>
        <li>Delivered <strong>motorkux.id</strong> go-live (2022) and <strong>seva.id marketplace</strong> launch (2020) with payment, shipping, and 3rd-party integrations.</li>
        <li>Architected a two-service Rules-as-a-Service decisioning platform (Publishing Service & Evaluation Service) with a custom JSON-to-DRL DSL and Kafka-driven hot-reload, eliminating backend development for new rules.</li>
        <li>Architected the platform and led initial team implementation, then took over hands-on engineering ownership to drive detailed enhancements (operator taxonomy, collection quantifiers, multi-object semantics, hot-reload mechanism) to production readiness.</li>
        <li>Led multiple SAP Commerce upgrades across enterprise platforms (seva.id, auto2000, motorkux.id - versions 6.6 → 2205).</li>
        <li>Developed custom promotion engine supporting location-based quota without coupon dependency.</li>
      </ul>

      <p><strong>Technology Stack:</strong> Java, Spring Boot, Spring MVC, Microservices Architecture, SAP Commerce (Hybris), Drools, EHCache, Kafka, Redis, SAP CDP, SAP Emarsys, SAP S/4HANA, Azure DevOps, Jenkins, Docker, AKS, Azure Function App, TypeScript.</p>

