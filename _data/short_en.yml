title: "Yusuf Adiputera – Lead Software Engineer (Condensed Version)"
description: "Condensed resume of Yusuf Adiputera, Lead Software Engineer with more than 8 years of experience in Java and Enterprise Commerce."
subtitle: "Lead Software Engineer | Java, Distributed Systems & Enterprise Commerce"
summary_html: |
  <p>
      Lead Software Engineer with more than 8 years of experience specializing in <strong>Java &amp; Spring architecture
      and enterprise e-commerce platforms</strong>.
      Experienced in designing and delivering major systems for Astra Group (IDX:ASII), with a focus on scalability,
      platform modernization, and microservices integration.
  </p>
  <p>
      Expertise spans Spring-based microservices, dynamic rules engines (Rules-as-a-Service),
      and performance engineering (achieving sub-second load times). Brings deep experience in 
      infrastructure (CI/CD, database migrations) and enterprise SAP integrations (CDP, Emarsys, S/4HANA).
      Dedicated to engineering leadership, technical strategy, and building maintainable systems.
  </p>
key_achievements:
  - label: "Lead Architect"
    text: "Architected and launched <i>motorkux.id</i> (2021–Present) and <i>seva.id</i> marketplace (2019–2021)."
  - label: "Award Recipient"
    text: "Received the internal \"Best Project Development Quality\" award (2024)."
  - label: "Rules-as-a-Service"
    text: "Architected a Rules-as-a-Service decisioning platform with a custom JSON-to-DRL DSL, eliminating backend development for new rules."
  - label: "Performance"
    text: "Diagnosed 10× request amplification via Datadog and achieved sub-second latency (~800ms P95) through EHCache full-page caching."
  - label: "Modernization"
    text: "Leading the migration of legacy e-commerce monoliths to Spring Boot–based microservices."
  - label: "Enterprise Integration"
    text: "Delivered integrations for SAP CDP, Emarsys, and S/4HANA ABAP."
