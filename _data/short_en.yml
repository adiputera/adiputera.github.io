title: "Yusuf Adiputera – Lead Software Engineer (Condensed Version)"
description: "Condensed resume of Yusuf Adiputera, Lead Software Engineer with more than 8 years of experience in Java and Enterprise Commerce."
subtitle: "Lead Software Engineer | Java, Distributed Systems & Enterprise Commerce"
summary_html: |
  <p>
      I'm a Lead Software Engineer with more than 8 years of experience specializing in <strong>Java &amp; Spring architecture
      and enterprise e-commerce platforms</strong>.
      I've been designing and delivering major systems for Astra Group (IDX:ASII), with a focus on scalability,
      platform modernization, and microservices integration.
  </p>
  <p>
      Designed a Rules-as-a-Service platform that lets business teams ship new pricing, promotion, and eligibility rules without backend deploys. The engine is intentionally generic: it doesn't know what a Customer or Product is, so new rules onboard without engineering work.
  </p>
  <p>
      My expertise also spans Spring-based microservices and performance engineering (achieving sub-second load times). I've delivered CI/CD pipelines, database migrations, and enterprise SAP integrations (CDP, Emarsys, S/4HANA).
      I'm dedicated to engineering leadership, technical direction, and building maintainable systems.
  </p>
key_achievements:
  - label: "Lead Engineer"
    text: "Led engineering for <i>motorkux.id</i> (2021–Present) and <i>seva.id</i> marketplace (2019–2021)."
  - label: "Award Recipient"
    text: "Received the internal \"Best Project Development Quality\" award (2024)."
  - label: "Rules-as-a-Service"
    text: "Designed a platform that lets business teams author new pricing, promotion, and eligibility rules directly, without backend deploys. The engine is intentionally generic: it doesn't know what a Customer or Product is, it just evaluates conditions on whatever data the client sends in. That's why new rules onboard without engineering work. Backend involvement is only needed for genuinely new categories of rule logic, which is rare."
  - label: "Performance"
    text: "Diagnosed 10× request amplification on SAP Commerce Accelerator via Datadog and reduced P95 latency from 2.1s to ~800ms via EHCache full-page caching, enabling 3× traffic absorption without horizontal scaling."
  - label: "Modernization"
    text: "Technical lead on the migration from legacy e-commerce monoliths to Spring Boot–based microservices."
  - label: "Enterprise Integration"
    text: "Delivered integrations for SAP CDP, Emarsys, and S/4HANA ABAP."
