subtitle: "Lead Software Engineer | Java, SAP Commerce & Spring Framework"
summary_html: |
  <p>
      Lead Software Engineer with more than 8 years of experience specializing in <strong>Java and SAP
          Commerce (Hybris) architecture</strong>.
      Proven track record in designing and delivering enterprise-scale e-commerce platforms for Astra
      Group, focusing on scalability,
      platform modernization, and high-performance system integration.
  </p>
  <p>
      Expertise includes Spring-based microservices, dynamic rules engines (Rules-as-a-Service),
      performance engineering (EHCache, lazy loading),
      and enterprise integration within the SAP landscape (SAP CDP, SAP Engagement/Emarsys, S/4HANA).
      Passionate about engineering leadership,
      technical strategy, and building maintainable, high-availability systems.
  </p>
