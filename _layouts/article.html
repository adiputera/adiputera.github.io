---
layout: default
---

<div class="container">
    {% include navigation.html %}
    
    <article class="article-content">
        <header>
            <h1>{{ page.title }}</h1>
            {% if page.date %}
            <p class="article-meta">
                Published on <time datetime="{{ page.date }}">{{ page.date | date: "%B %d, %Y" }}</time> by {{ site.author }}
            </p>
            {% endif %}
        </header>
        
        <main>
            {{ content }}
        </main>
        
        {% if page.canonical_url %}
        <footer class="article-footer">
            <p>Originally published on <a href="{{ page.canonical_url }}" target="_blank" rel="noopener noreferrer">SAP Community</a>.</p>
        </footer>
        {% endif %}
    </article>
    
    {% include footer.html %}
</div>
